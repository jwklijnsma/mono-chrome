name: Weekly Docker Build & Release

on:
  schedule:
    # Every Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force a release even if no new commits'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write       # create releases & tags
  packages: write       # push to GHCR

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    outputs:
      upstream_sha: ${{ steps.upstream.outputs.sha }}
      upstream_short: ${{ steps.upstream.outputs.short }}
      tag: ${{ steps.tag.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}

    steps:
      # ── 1. Get latest upstream commit ──────────────────────────────────────
      - name: Fetch latest upstream commit
        id: upstream
        run: |
          SHA=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/monochrome-music/monochrome/commits/main \
            | jq -r '.sha')
          SHORT="${SHA:0:7}"
          echo "sha=$SHA"   >> "$GITHUB_OUTPUT"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"
          echo "Upstream HEAD: $SHA ($SHORT)"

      # ── 2. Derive the release tag ───────────────────────────────────────────
      #    Format: YYYY-WNN-<short-sha>   e.g. 2026-W16-cf08290
      - name: Derive tag
        id: tag
        run: |
          WEEK=$(date -u +%G-W%V)            # ISO week, e.g. 2026-W16
          TAG="${WEEK}-${{ steps.upstream.outputs.short }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      # ── 3. Check whether this tag already exists ────────────────────────────
      - name: Check if tag already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          EXISTS=$(gh api repos/${{ github.repository }}/releases/tags/$TAG \
            --silent --jq '.tag_name' 2>/dev/null || echo "")
          if [[ -n "$EXISTS" && "${{ inputs.force_release }}" != "true" ]]; then
            echo "Tag $TAG already exists – skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    needs: check-and-release
    if: needs.check-and-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    env:
      UPSTREAM_SHA: ${{ needs.check-and-release.outputs.upstream_sha }}
      UPSTREAM_SHORT: ${{ needs.check-and-release.outputs.upstream_short }}
      TAG: ${{ needs.check-and-release.outputs.tag }}
      IMAGE: ghcr.io/${{ github.repository_owner }}/monochrome

    steps:
      # ── 4. Check out upstream source at the exact commit ───────────────────
      - name: Checkout upstream monochrome @ ${{ env.UPSTREAM_SHORT }}
        uses: actions/checkout@v4
        with:
          repository: monochrome-music/monochrome
          ref: ${{ env.UPSTREAM_SHA }}
          path: src

      # ── 5. Set up QEMU + Buildx for multi-arch (amd64 + arm64) ─────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 6. Log in to GHCR ──────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Build & push ────────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Tags: weekly release tag  +  'latest'
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/monochrome-music/monochrome
            org.opencontainers.image.revision=${{ env.UPSTREAM_SHA }}
            org.opencontainers.image.version=${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Pass all optional build-args from repo secrets (all optional)
          build-args: |
            AUTH_ENABLED=${{ vars.AUTH_ENABLED }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            APPWRITE_ENDPOINT=${{ vars.APPWRITE_ENDPOINT }}
            APPWRITE_PROJECT_ID=${{ vars.APPWRITE_PROJECT_ID }}
            POCKETBASE_URL=${{ vars.POCKETBASE_URL }}
            SESSION_MAX_AGE=${{ vars.SESSION_MAX_AGE }}

      # ── 8. Fetch upstream commit message for release notes ─────────────────
      - name: Get upstream commit details
        id: commit_info
        run: |
          DATA=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/monochrome-music/monochrome/commits/${{ env.UPSTREAM_SHA }}")
          MSG=$(echo "$DATA" | jq -r '.commit.message' | head -20)
          AUTHOR=$(echo "$DATA" | jq -r '.commit.author.name')
          DATE=$(echo "$DATA" | jq -r '.commit.author.date')
          # Escape for multi-line GitHub output
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "msg<<$EOF"  >> "$GITHUB_OUTPUT"
          echo "$MSG"       >> "$GITHUB_OUTPUT"
          echo "$EOF"       >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
          echo "date=$DATE"     >> "$GITHUB_OUTPUT"

      # ── 9. Get recent upstream commit log for tag page ─────────────────────
      - name: Get upstream commits since last week
        id: commit_log
        run: |
          SINCE=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
               || date -u -v-7d +%Y-%m-%dT%H:%M:%SZ)   # macOS fallback
          COMMITS=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/monochrome-music/monochrome/commits?sha=main&since=$SINCE&per_page=50" \
            | jq -r '.[] | "- [`\(.sha[0:7])`](https://github.com/monochrome-music/monochrome/commit/\(.sha)) \(.commit.message | split("\n")[0]) — \(.commit.author.name)"')
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "log<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS"  >> "$GITHUB_OUTPUT"
          echo "$EOF"      >> "$GITHUB_OUTPUT"

      # ── 10. Create GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.TAG }}"
          IMAGE="${{ env.IMAGE }}"
          UPSTREAM_SHA="${{ env.UPSTREAM_SHA }}"
          UPSTREAM_SHORT="${{ env.UPSTREAM_SHORT }}"

          cat > /tmp/release-notes.md << 'NOTES_EOF'
          ## 🎵 Monochrome — ${{ env.TAG }}

          Automated weekly build from upstream [`monochrome-music/monochrome`](https://github.com/monochrome-music/monochrome).

          ### 📦 Upstream commit

          | Field  | Value |
          |--------|-------|
          | SHA    | [`${{ env.UPSTREAM_SHORT }}`](https://github.com/monochrome-music/monochrome/commit/${{ env.UPSTREAM_SHA }}) |
          | Author | ${{ steps.commit_info.outputs.author }} |
          | Date   | ${{ steps.commit_info.outputs.date }} |

          **Commit message:**
          ```
          ${{ steps.commit_info.outputs.msg }}
          ```

          ### 🕐 Commits in this build window (last 7 days)

          ${{ steps.commit_log.outputs.log }}

          ---

          ### 🐳 Docker

          ```bash
          # Latest
          docker pull ${{ env.IMAGE }}:latest

          # This exact weekly build
          docker pull ${{ env.IMAGE }}:${{ env.TAG }}
          ```

          **Quick start:**
          ```bash
          docker run -d \
            --name monochrome \
            -p 3000:4173 \
            --restart unless-stopped \
            ${{ env.IMAGE }}:${{ env.TAG }}
          ```
          NOTES_EOF

          gh release create "$TAG" \
            --title "Monochrome $TAG" \
            --notes-file /tmp/release-notes.md \
            --repo "${{ github.repository }}"
