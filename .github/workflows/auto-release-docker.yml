name: Docker

on:
  schedule:
    # Every Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force a release even if no new commits'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      upstream_sha: ${{ steps.upstream.outputs.sha }}
      upstream_short: ${{ steps.upstream.outputs.short }}
      tag: ${{ steps.tag.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}

    steps:
      - uses: actions/checkout@v6

      - name: Fetch latest upstream commit
        id: upstream
        run: |
          SHA=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/monochrome-music/monochrome/commits/main \
            | jq -r '.sha')
          SHORT="${SHA:0:7}"
          echo "sha=$SHA"     >> "$GITHUB_OUTPUT"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"
          echo "Upstream HEAD: $SHA ($SHORT)"

      - name: Derive release tag
        id: tag
        run: |
          WEEK=$(date -u +%G-W%V)
          TAG="${WEEK}-${{ steps.upstream.outputs.short }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Check if tag already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          EXISTS=$(gh api repos/${{ github.repository }}/releases/tags/$TAG \
            --silent --jq '.tag_name' 2>/dev/null || echo "")
          if [[ -n "$EXISTS" && "${{ inputs.force_release }}" != "true" ]]; then
            echo "Tag $TAG already exists - skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write   # needed for cosign keyless signing

    env:
      UPSTREAM_SHA:   ${{ needs.check.outputs.upstream_sha }}
      UPSTREAM_SHORT: ${{ needs.check.outputs.upstream_short }}
      TAG:            ${{ needs.check.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout upstream monochrome @ ${{ needs.check.outputs.upstream_sha }}
        uses: actions/checkout@v6
        with:
          repository: monochrome-music/monochrome
          ref: ${{ needs.check.outputs.upstream_sha }}
          path: src
          fetch-depth: 1

      # Patch upstream Dockerfile for this build environment:
      #  1. Lockfile: upstream copies package-lock.json but repo uses bun.lock(b)
      #
      #  Note: vite.config.ts calls `git rev-parse --short HEAD` but already has
      #  a try/catch that returns 'unknown' on failure. The upstream .dockerignore
      #  excludes .git, so we do NOT copy it — the graceful fallback is sufficient.
      - name: Patch upstream Dockerfile
        run: |
          DF=src/docker/Dockerfile
          echo "--- FROM ---" && grep -m1 '^FROM' "$DF"

          # lockfile wildcard (bun has no package-lock.json)
          sed -i \
            's|COPY package\.json package-lock\.json \./|COPY package.json bun.lock* bun.lockb* package-lock.json* ./|' \
            "$DF"

          echo "--- patched lines ---"
          grep 'COPY package' "$DF"

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Produces tags:
      #   ghcr.io/<owner>/<repo>:2026-W16-cf08290
      #   ghcr.io/<owner>/<repo>:latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.TAG }}
            type=raw,value=latest

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: src
          file: src/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            AUTH_ENABLED=${{ vars.AUTH_ENABLED }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            APPWRITE_ENDPOINT=${{ vars.APPWRITE_ENDPOINT }}
            APPWRITE_PROJECT_ID=${{ vars.APPWRITE_PROJECT_ID }}
            POCKETBASE_URL=${{ vars.POCKETBASE_URL }}
            SESSION_MAX_AGE=${{ vars.SESSION_MAX_AGE }}

      # Sign the image digest with cosign keyless (Sigstore/Fulcio)
      - name: Sign the published Docker image
        env:
          TAGS:   ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

      # ── Release notes ──────────────────────────────────────────────────────

      - name: Get upstream commit details
        id: commit_info
        run: |
          DATA=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/monochrome-music/monochrome/commits/${{ env.UPSTREAM_SHA }}")
          MSG=$(echo "$DATA"    | jq -r '.commit.message' | head -20)
          AUTHOR=$(echo "$DATA" | jq -r '.commit.author.name')
          DATE=$(echo "$DATA"   | jq -r '.commit.author.date')
          DELIM=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "msg<<$DELIM"    >> "$GITHUB_OUTPUT"
          echo "$MSG"           >> "$GITHUB_OUTPUT"
          echo "$DELIM"         >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
          echo "date=$DATE"     >> "$GITHUB_OUTPUT"

      - name: Get upstream commits since last week
        id: commit_log
        run: |
          SINCE=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          COMMITS=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/monochrome-music/monochrome/commits?sha=main&since=$SINCE&per_page=50" \
            | jq -r '.[] | "- [`\(.sha[0:7])`](https://github.com/monochrome-music/monochrome/commit/\(.sha)) \(.commit.message | split("\n")[0]) -- \(.commit.author.name)"')
          DELIM=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "log<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$COMMITS"    >> "$GITHUB_OUTPUT"
          echo "$DELIM"      >> "$GITHUB_OUTPUT"

      - name: Write release notes
        env:
          COMMIT_AUTHOR: ${{ steps.commit_info.outputs.author }}
          COMMIT_DATE:   ${{ steps.commit_info.outputs.date }}
          COMMIT_MSG:    ${{ steps.commit_info.outputs.msg }}
          COMMIT_LOG:    ${{ steps.commit_log.outputs.log }}
          IMAGE:         ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST:        ${{ steps.build-and-push.outputs.digest }}
        run: |
          python3 - <<'PYEOF'
          import os, textwrap
          tag    = os.environ["TAG"]
          image  = os.environ["IMAGE"].lower()
          sha    = os.environ["UPSTREAM_SHA"]
          short  = os.environ["UPSTREAM_SHORT"]
          digest = os.environ["DIGEST"]
          author = os.environ.get("COMMIT_AUTHOR", "")
          date   = os.environ.get("COMMIT_DATE", "")
          msg    = os.environ.get("COMMIT_MSG", "")
          log    = os.environ.get("COMMIT_LOG", "_(no commits in the last 7 days)_")
          notes = textwrap.dedent(f"""\
          ## Monochrome {tag}

          Automated weekly build from upstream [`monochrome-music/monochrome`](https://github.com/monochrome-music/monochrome).

          ### Upstream commit

          | Field  | Value |
          |--------|-------|
          | SHA    | [`{short}`](https://github.com/monochrome-music/monochrome/commit/{sha}) |
          | Author | {author} |
          | Date   | {date} |

          **Commit message:**
          ```
          {msg}
          ```

          ### Commits in this build window (last 7 days)

          {log}

          ---

          ### Docker

          ```bash
          # By tag
          docker pull {image}:{tag}

          # By immutable digest (recommended)
          docker pull {image}@{digest}

          # Latest
          docker pull {image}:latest
          ```

          **Quick start:**
          ```bash
          docker run -d \\
            --name monochrome \\
            -p 3000:4173 \\
            --restart unless-stopped \\
            {image}:{tag}
          ```

          > Image is signed with [cosign](https://github.com/sigstore/cosign) keyless signing.
          > Verify with: `cosign verify {image}:{tag} --certificate-identity-regexp='https://github.com/{os.environ.get("GITHUB_REPOSITORY", "")}' --certificate-oidc-issuer='https://token.actions.githubusercontent.com'`
          """)
          with open("/tmp/release-notes.md", "w") as f:
              f.write(notes)
          PYEOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.TAG }}" \
            --title "Monochrome ${{ env.TAG }}" \
            --notes-file /tmp/release-notes.md \
            --repo "${{ github.repository }}"
