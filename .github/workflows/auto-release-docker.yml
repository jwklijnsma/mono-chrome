name: Weekly Docker Build & Release

on:
  schedule:
    # Every Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force a release even if no new commits'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write       # create releases & tags
  packages: write       # push to GHCR

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    outputs:
      upstream_sha: ${{ steps.upstream.outputs.sha }}
      upstream_short: ${{ steps.upstream.outputs.short }}
      tag: ${{ steps.tag.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}

    steps:
      # ── 1. Check out fork so GITHUB_TOKEN is tied to this repo ────────────
      #   Without this, GHCR denies write_package because the token has no
      #   repo context. This checkout must happen before any docker login.
      - uses: actions/checkout@v4

      # ── 2. Get latest upstream commit ──────────────────────────────────────
      - name: Fetch latest upstream commit
        id: upstream
        run: |
          SHA=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/monochrome-music/monochrome/commits/main \
            | jq -r '.sha')
          SHORT="${SHA:0:7}"
          echo "sha=$SHA"     >> "$GITHUB_OUTPUT"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"
          echo "Upstream HEAD: $SHA ($SHORT)"

      # ── 3. Derive the release tag ───────────────────────────────────────────
      #    Format: YYYY-WNN-<short-sha>   e.g. 2026-W16-cf08290
      - name: Derive tag
        id: tag
        run: |
          WEEK=$(date -u +%G-W%V)
          TAG="${WEEK}-${{ steps.upstream.outputs.short }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      # ── 4. Check whether this tag already exists ────────────────────────────
      - name: Check if tag already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          EXISTS=$(gh api repos/${{ github.repository }}/releases/tags/$TAG \
            --silent --jq '.tag_name' 2>/dev/null || echo "")
          if [[ -n "$EXISTS" && "${{ inputs.force_release }}" != "true" ]]; then
            echo "Tag $TAG already exists - skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    needs: check-and-release
    if: needs.check-and-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    env:
      UPSTREAM_SHA:   ${{ needs.check-and-release.outputs.upstream_sha }}
      UPSTREAM_SHORT: ${{ needs.check-and-release.outputs.upstream_short }}
      TAG:            ${{ needs.check-and-release.outputs.tag }}
      # GHCR image name must be all-lowercase
      IMAGE: ghcr.io/jwklijnsma/monochrome

    steps:
      # ── 5. Check out fork first — CRITICAL for GHCR write permission ───────
      #   GHCR's write_package permission is granted to the GITHUB_TOKEN only
      #   when the workflow's repo has been checked out in the same job.
      #   Without this step the push returns "permission_denied: write_package".
      - name: Checkout fork (GHCR token anchor)
        uses: actions/checkout@v4

      # ── 6. Check out upstream source at the exact commit ───────────────────
      - name: Checkout upstream monochrome @ ${{ env.UPSTREAM_SHA }}
        uses: actions/checkout@v4
        with:
          repository: monochrome-music/monochrome
          ref: ${{ env.UPSTREAM_SHA }}
          path: src

      # ── 7. Verify Dockerfile & patch for build environment ────────────────
      #   Patches applied:
      #   1. lockfile COPY: upstream copies package-lock.json but repo uses Bun
      #      (bun.lock / bun.lockb). Wildcard glob handles whichever is present.
      #   2. git: oven/bun:alpine has no git; vite injects commit hash at build
      #      time via `git rev-parse`. Add git to the existing apk install line.
      - name: Verify & patch upstream Dockerfile
        run: |
          DOCKERFILE=src/docker/Dockerfile
          echo "=== First FROM line ==="
          grep -m1 '^FROM' "$DOCKERFILE"

          # Patch 1: lockfile wildcard
          sed -i \
            's|COPY package\.json package-lock\.json \./|COPY package.json bun.lock* bun.lockb* package-lock.json* ./|' \
            "$DOCKERFILE"

          # Patch 2: add git to apk so vite git-hash injection does not fail
          sed -i \
            's|apk add --no-cache \(.*\)|apk add --no-cache \1 git|' \
            "$DOCKERFILE"

          echo "=== Patched lines ==="
          grep -E 'COPY package|apk add' "$DOCKERFILE"

      # ── 8. Set up QEMU + Buildx for multi-arch (amd64 + arm64) ─────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 9. Log in to GHCR ──────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Build & push ───────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/monochrome-music/monochrome
            org.opencontainers.image.revision=${{ env.UPSTREAM_SHA }}
            org.opencontainers.image.version=${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            AUTH_ENABLED=${{ vars.AUTH_ENABLED }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            APPWRITE_ENDPOINT=${{ vars.APPWRITE_ENDPOINT }}
            APPWRITE_PROJECT_ID=${{ vars.APPWRITE_PROJECT_ID }}
            POCKETBASE_URL=${{ vars.POCKETBASE_URL }}
            SESSION_MAX_AGE=${{ vars.SESSION_MAX_AGE }}

      # ── 11. Fetch upstream commit details for release notes ────────────────
      - name: Get upstream commit details
        id: commit_info
        run: |
          DATA=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/monochrome-music/monochrome/commits/${{ env.UPSTREAM_SHA }}")
          MSG=$(echo "$DATA"    | jq -r '.commit.message' | head -20)
          AUTHOR=$(echo "$DATA" | jq -r '.commit.author.name')
          DATE=$(echo "$DATA"   | jq -r '.commit.author.date')
          DELIM=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "msg<<$DELIM"    >> "$GITHUB_OUTPUT"
          echo "$MSG"           >> "$GITHUB_OUTPUT"
          echo "$DELIM"         >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
          echo "date=$DATE"     >> "$GITHUB_OUTPUT"

      # ── 12. Get upstream commits from the past 7 days ─────────────────────
      - name: Get upstream commits since last week
        id: commit_log
        run: |
          SINCE=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          COMMITS=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/monochrome-music/monochrome/commits?sha=main&since=$SINCE&per_page=50" \
            | jq -r '.[] | "- [`\(.sha[0:7])`](https://github.com/monochrome-music/monochrome/commit/\(.sha)) \(.commit.message | split("\n")[0]) -- \(.commit.author.name)"')
          DELIM=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "log<<$DELIM" >> "$GITHUB_OUTPUT"
          echo "$COMMITS"    >> "$GITHUB_OUTPUT"
          echo "$DELIM"      >> "$GITHUB_OUTPUT"

      # ── 13. Write release notes (Python avoids heredoc + expression issues) ─
      - name: Write release notes
        env:
          COMMIT_AUTHOR: ${{ steps.commit_info.outputs.author }}
          COMMIT_DATE:   ${{ steps.commit_info.outputs.date }}
          COMMIT_MSG:    ${{ steps.commit_info.outputs.msg }}
          COMMIT_LOG:    ${{ steps.commit_log.outputs.log }}
        run: |
          python3 - <<'PYEOF'
          import os, textwrap
          tag    = os.environ["TAG"]
          image  = os.environ["IMAGE"]
          sha    = os.environ["UPSTREAM_SHA"]
          short  = os.environ["UPSTREAM_SHORT"]
          author = os.environ.get("COMMIT_AUTHOR", "")
          date   = os.environ.get("COMMIT_DATE", "")
          msg    = os.environ.get("COMMIT_MSG", "")
          log    = os.environ.get("COMMIT_LOG", "_(no commits in the last 7 days)_")
          notes = textwrap.dedent(f"""\
          ## Monochrome {tag}

          Automated weekly build from upstream [`monochrome-music/monochrome`](https://github.com/monochrome-music/monochrome).

          ### Upstream commit

          | Field  | Value |
          |--------|-------|
          | SHA    | [`{short}`](https://github.com/monochrome-music/monochrome/commit/{sha}) |
          | Author | {author} |
          | Date   | {date} |

          **Commit message:**
          ```
          {msg}
          ```

          ### Commits in this build window (last 7 days)

          {log}

          ---

          ### Docker

          ```bash
          # Latest
          docker pull {image}:latest

          # This exact weekly build
          docker pull {image}:{tag}
          ```

          **Quick start:**
          ```bash
          docker run -d \\
            --name monochrome \\
            -p 3000:4173 \\
            --restart unless-stopped \\
            {image}:{tag}
          ```
          """)
          with open("/tmp/release-notes.md", "w") as f:
              f.write(notes)
          print("Release notes written.")
          PYEOF

      # ── 14. Create GitHub Release ──────────────────────────────────────────
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.TAG }}" \
            --title "Monochrome ${{ env.TAG }}" \
            --notes-file /tmp/release-notes.md \
            --repo "${{ github.repository }}"
