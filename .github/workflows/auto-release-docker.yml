name: Auto Release + Docker

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 04:24 UTC
    - cron: "24 4 * * 1"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: monochrome-music/monochrome

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.semver.outputs.version }}
      should_build: ${{ steps.check.outputs.should_release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Pull all commits from upstream since last local tag ────────────────
      - name: Get latest upstream commits + compute semver
        id: semver
        run: |
          # Fetch upstream commits via GitHub API
          COMMITS_JSON=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/commits?per_page=100")

          # Latest upstream commit SHA (used as unique identifier)
          UPSTREAM_SHA=$(echo "$COMMITS_JSON" | jq -r '.[0].sha' | cut -c1-7)

          # Get current local release tag (if any)
          CURRENT_TAG=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | jq -r '.tag_name // "none"')

          echo "Current release tag: $CURRENT_TAG"

          # Determine base version
          if [ "$CURRENT_TAG" = "none" ] || [ "$CURRENT_TAG" = "null" ]; then
            BASE="0.0.0"
          else
            BASE="${CURRENT_TAG#v}"
          fi

          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)

          # Build commit log since last release
          if [ "$CURRENT_TAG" = "none" ] || [ "$CURRENT_TAG" = "null" ]; then
            LOG=$(echo "$COMMITS_JSON" | jq -r '.[].commit | "- \(.message | split("\n")[0]) (\(.author.name))"' | head -30)
            COUNT=$(echo "$COMMITS_JSON" | jq 'length')
          else
            # Get commits only newer than the stored SHA in the tag message
            LAST_SHA=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
              | jq -r '.body' | grep -o 'upstream-sha: [a-f0-9]*' | awk '{print $2}')

            if [ -z "$LAST_SHA" ]; then
              LOG=$(echo "$COMMITS_JSON" | jq -r '.[].commit | "- \(.message | split("\n")[0]) (\(.author.name))"' | head -30)
              COUNT=$(echo "$COMMITS_JSON" | jq 'length')
            else
              # Filter commits newer than last known SHA
              LOG=$(echo "$COMMITS_JSON" | jq -r \
                --arg sha "$LAST_SHA" \
                '[.[] | select(.sha | startswith($sha) | not)] | .[].commit | "- \(.message | split("\n")[0]) (\(.author.name))"' | head -30)
              COUNT=$(echo "$COMMITS_JSON" | jq -r \
                --arg sha "$LAST_SHA" \
                '[.[] | select(.sha | startswith($sha) | not)] | length')
            fi
          fi

          echo "New commits: $COUNT"
          echo "Latest upstream SHA: $UPSTREAM_SHA"

          # Semver bump logic:
          #   breaking in commit message → MAJOR
          #   10+ new commits            → MINOR
          #   otherwise                  → PATCH
          if echo "$LOG" | grep -qi "breaking\|BREAKING"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            BUMP="major"
          elif [ "$COUNT" -ge 10 ]; then
            MINOR=$((MINOR + 1)); PATCH=0
            BUMP="minor"
          else
            PATCH=$((PATCH + 1))
            BUMP="patch"
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"

          echo "version=$NEW_TAG"          >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP"                >> "$GITHUB_OUTPUT"
          echo "commit_count=$COUNT"       >> "$GITHUB_OUTPUT"

          # Write release notes to file
          {
            echo "## 🚀 Release $NEW_TAG"
            echo ""
            echo "Bump type: **$BUMP** · $COUNT new upstream commits"
            echo ""
            echo "## 📝 Commits"
            echo ""
            echo "$LOG"
            echo ""
            echo "## 🐳 Docker Image"
            echo "- Built automatically from [monochrome-music/monochrome](https://github.com/monochrome-music/monochrome)"
            echo "- Image: \`ghcr.io/${{ github.repository }}:$NEW_TAG\`"
            echo "- Also available as \`ghcr.io/${{ github.repository }}:latest\`"
            echo ""
            echo "<!-- upstream-sha: $UPSTREAM_SHA -->"
          } > notes.md

          cat notes.md

      # ── Check if there is something new to release ────────────────────────
      - name: Get current release tag
        id: current
        run: |
          CURRENT=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | jq -r '.tag_name // "none"')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Check if new version exists
        id: check
        run: |
          if [ "${{ steps.semver.outputs.version }}" = "${{ steps.current.outputs.current }}" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.semver.outputs.version }} already released — skipping."
          elif [ "${{ steps.semver.outputs.commit_count }}" = "0" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No new commits — skipping."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.version }}
          name: Release ${{ steps.semver.outputs.version }}
          body_path: notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Docker
    needs: release
    if: needs.release.outputs.should_build == 'true'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: main

      - name: Set version
        run: echo "VERSION=${{ needs.release.outputs.version }}" >> "$GITHUB_ENV"

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3.8.2
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=monochrome
            org.opencontainers.image.description=Open-source privacy-respecting ad-free TIDAL web UI
            org.opencontainers.image.source=https://github.com/monochrome-music/monochrome
            org.opencontainers.image.version=${{ env.VERSION }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ env.VERSION }}

      - name: Sign Docker image
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
